services:
  pds:
    image: ghcr.io/bluesky-social/pds:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:2583:3000"
    volumes:
      - pds-data:/pds
    env_file:
      - .env
    environment:
      PDS_DATA_DIRECTORY: /pds
      PDS_BLOBSTORE_DISK_LOCATION: /pds/blocks
      PDS_PORT: "3000"
      PDS_DID_PLC_URL: https://plc.directory
      PDS_CRAWLERS: ""

volumes:
  pds-data:
